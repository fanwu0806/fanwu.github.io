{% assign sorted_projects = site.projects | sort: "order" %}

{% for project in sorted_projects %}
  <div style="text-align:center; margin-bottom:40px; background:yellow;">
    <a href="{{ site.baseurl }}{{ project.url }}"
       style="display:block; width:260px; margin:0 auto; border:5px solid red; text-decoration:none;">
      <img src="{{ site.baseurl }}{{ project.image }}"
           alt="{{ project.title }}"
           style="display:block; width:100%; border-radius:8px;">
    </a>

    <div style="width:260px; margin:12px auto 0 auto; text-align:center;">
      <a href="{{ site.baseurl }}{{ project.url }}"
         style="color:#1a4b7a; text-decoration:none; font-size:1.05rem; font-weight:600; line-height:1.4;">
        {{ project.title }}
      </a>
    </div>
  </div>
{% endfor %}
