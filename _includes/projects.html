{% assign sorted_projects = site.projects | sort: "order" %}

{% for project in sorted_projects %}
  <div style="margin-bottom: 40px; text-align: center;">
    <a href="{{ site.baseurl }}{{ project.url }}" style="text-decoration: none;">
      <img src="{{ site.baseurl }}{{ project.image }}"
           class="img-fluid z-depth-1"
           style="display: block; width: 100%; max-width: 760px; margin: 0 auto; border-radius: 8px;">
    </a>

    <div style="margin-top: 12px; text-align: center;">
      <a href="{{ site.baseurl }}{{ project.url }}"
         style="color: inherit; text-decoration: none; font-size: 1.02rem; font-weight: 600; line-height: 1.4;">
        {{ project.title }}
      </a>
    </div>
  </div>
{% endfor %}
